name: don3txt
description: "Todo.txt task manager for Android"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.0
  path_provider: ^2.1.0
  google_fonts: ^6.2.0
  shared_preferences: ^2.2.0
  file_picker: ^8.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
